services:
    db:
        image: postgres:17-alpine
        networks:
            - beacon-net
        environment:
            POSTGRES_USER: beacon
            POSTGRES_PASSWORD: beacon
            POSTGRES_DB: beacon
        volumes:
            - pgdata:/var/lib/postgresql/data
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U beacon"]
            interval: 5s
            timeout: 5s
            retries: 5
    backend:
        build:
            context: .
        image: devangy/beacon-backend:latest
        restart: unless-stopped
        env_file:
            - .env
        environment:
            DATABASE_URL: postgres://beacon:beacon@db:5432/beacon
        depends_on:
            db:
                condition: service_healthy
        networks:
            - beacon-net
    tunnel:
        image: cloudflare/cloudflared:latest
        restart: unless-stopped
        command: tunnel --url http://backend:3082 --protocol http2
        depends_on:
            - backend
        networks:
            - beacon-net

volumes:
    pgdata:

networks:
    beacon-net:
        driver: bridge
